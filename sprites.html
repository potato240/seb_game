<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vehicle Sprites</title>
  <style>
    body { background: #333; display: flex; flex-wrap: wrap; gap: 20px; padding: 30px; }
    canvas { display: block; }
    .label { color: white; text-align: center; font-family: sans-serif; font-size: 12px; margin-top: 4px; }
    .vehicle { display: flex; flex-direction: column; align-items: center; }
  </style>
</head>
<body>
<script>
  const vehicles = [
    { label: "Red Ute",    body: "#e74c3c", cab: "#c0392b", window: "#aee6f9" },
    { label: "Blue Ute",   body: "#2980b9", cab: "#1a5276", window: "#aee6f9" },
    { label: "Green Ute",  body: "#27ae60", cab: "#1e8449", window: "#aee6f9" },
    { label: "Yellow Ute", body: "#f1c40f", cab: "#d4ac0d", window: "#aee6f9" },
    { label: "Orange Ute", body: "#e67e22", cab: "#ca6f1e", window: "#aee6f9" },
    { label: "Purple Ute", body: "#8e44ad", cab: "#6c3483", window: "#aee6f9" },
  ];

  vehicles.forEach(v => {
    const div = document.createElement('div');
    div.className = 'vehicle';

    const canvas = document.createElement('canvas');
    canvas.width = 64;
    canvas.height = 96;
    const ctx = canvas.getContext('2d');

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath();
    ctx.ellipse(34, 88, 20, 6, 0, 0, Math.PI * 2);
    ctx.fill();

    // Tray (back of ute)
    ctx.fillStyle = v.body;
    ctx.beginPath();
    ctx.roundRect(12, 48, 40, 36, 4);
    ctx.fill();

    // Tray lines
    ctx.strokeStyle = v.cab;
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(12, 60); ctx.lineTo(52, 60); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(12, 72); ctx.lineTo(52, 72); ctx.stroke();

    // Cab (front)
    ctx.fillStyle = v.cab;
    ctx.beginPath();
    ctx.roundRect(10, 10, 44, 42, 6);
    ctx.fill();

    // Windscreen
    ctx.fillStyle = v.window;
    ctx.beginPath();
    ctx.roundRect(16, 14, 32, 18, 4);
    ctx.fill();

    // Windscreen glare
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.beginPath();
    ctx.roundRect(18, 16, 10, 6, 2);
    ctx.fill();

    // Wheels
    const wheels = [[8,18],[48,18],[8,56],[48,56]];
    wheels.forEach(([x, y]) => {
      ctx.fillStyle = '#222';
      ctx.beginPath();
      ctx.roundRect(x - 6, y - 5, 10, 12, 3);
      ctx.fill();
      ctx.fillStyle = '#555';
      ctx.beginPath();
      ctx.arc(x - 1, y + 1, 3, 0, Math.PI * 2);
      ctx.fill();
    });

    // Headlights
    ctx.fillStyle = '#fffaaa';
    ctx.beginPath(); ctx.ellipse(18, 10, 5, 3, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(46, 10, 5, 3, 0, 0, Math.PI * 2); ctx.fill();

    // Tail lights
    ctx.fillStyle = '#e74c3c';
    ctx.beginPath(); ctx.ellipse(18, 84, 5, 3, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(46, 84, 5, 3, 0, 0, Math.PI * 2); ctx.fill();

    const label = document.createElement('div');
    label.className = 'label';
    label.textContent = v.label;

    div.appendChild(canvas);
    div.appendChild(label);
    document.body.appendChild(div);
  });
</script>
</body>
</html>
